name: Clippy
options:
  bundleIdPrefix: com.clippy
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Clippy:
    type: application
    platform: macOS
    sources:
      - path: Clippy
        excludes:
          - Resources/Info.plist
    resources:
      - path: Clippy/Resources/clip.wav
      - path: Clippy/Resources/Assets.xcassets
    info:
      path: Clippy/Resources/Info.plist
      properties:
        CFBundleName: Clippy
        CFBundleDisplayName: Clippy
        CFBundleIdentifier: com.clippy.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        LSMinimumSystemVersion: "15.0"
        NSHumanReadableCopyright: "Copyright © 2026 Clippy"
        NSScreenCaptureUsageDescription: "Clippy needs screen recording access to capture your last few seconds of activity."
        NSMicrophoneUsageDescription: "Clippy uses your microphone for voice commands and to include your voice in screen clips."
        NSSpeechRecognitionUsageDescription: "Clippy uses speech recognition to trigger clips with your voice."
        NSAppleEventsUsageDescription: "Clippy needs accessibility access to register global keyboard shortcuts."
    entitlements:
      path: Clippy/Clippy.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clippy.app
        PRODUCT_NAME: Clippy
        INFOPLIST_FILE: Clippy/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Clippy/Clippy.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
